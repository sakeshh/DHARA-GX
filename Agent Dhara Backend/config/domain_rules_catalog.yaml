rules:
  - name: GSTIN
    column_hints: ["gstin", "gst_number", "gst_no"]
    regex: "^[0-9]{2}[A-Z]{5}[0-9]{4}[A-Z]{1}[1-9A-Z]{1}Z[0-9A-Z]{1}$"
    severity: HIGH
    message: "Value does not match valid Indian GSTIN format (15 characters)."
  - name: PAN
    column_hints: ["pan", "pan_number", "pan_no", "pancard"]
    regex: "^[A-Z]{5}[0-9]{4}[A-Z]{1}$"
    severity: HIGH
    message: "Value does not match valid Indian PAN format (10 characters)."
  - name: IFSC
    column_hints: ["ifsc", "ifsc_code"]
    regex: "^[A-Z]{4}0[A-Z0-9]{6}$"
    severity: MEDIUM
    message: "Value does not match valid Indian IFSC format (11 characters)."
